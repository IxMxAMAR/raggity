<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>raggity — local-first RAG chat</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d0d0d;
  --surface: #1a1a1a;
  --border: #2e2e2e;
  --accent: #7c6ef5;
  --accent-dim: #5a4fcf;
  --text: #e8e8e8;
  --text-dim: #888;
  --source-bg: #141414;
  --user-bubble: #1e1e2e;
  --bot-bubble: #181818;
  --radius: 10px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 15px;
  line-height: 1.6;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

header {
  width: 100%;
  max-width: 760px;
  padding: 18px 20px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid var(--border);
}

header h1 {
  font-size: 20px;
  font-weight: 600;
  letter-spacing: -0.3px;
  color: var(--accent);
}

header span {
  font-size: 13px;
  color: var(--text-dim);
}

#chat-container {
  flex: 1;
  width: 100%;
  max-width: 760px;
  overflow-y: auto;
  padding: 20px 20px 0;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.message {
  display: flex;
  flex-direction: column;
  gap: 4px;
  max-width: 88%;
  animation: fadeIn 0.15s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}

.message.user { align-self: flex-end; align-items: flex-end; }
.message.bot  { align-self: flex-start; align-items: flex-start; }

.bubble {
  padding: 10px 14px;
  border-radius: var(--radius);
  white-space: pre-wrap;
  word-break: break-word;
  line-height: 1.55;
}

.message.user .bubble {
  background: var(--user-bubble);
  border: 1px solid #2a2a40;
  color: var(--text);
}

.message.bot .bubble {
  background: var(--bot-bubble);
  border: 1px solid var(--border);
  color: var(--text);
}

.message.bot .bubble.streaming::after {
  content: '▍';
  display: inline-block;
  color: var(--accent);
  animation: blink 0.9s step-end infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}

.sources {
  font-size: 12px;
  color: var(--text-dim);
  background: var(--source-bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 12px;
  margin-top: 4px;
  max-width: 100%;
}

.sources strong {
  color: var(--text-dim);
  display: block;
  margin-bottom: 4px;
  text-transform: uppercase;
  font-size: 10px;
  letter-spacing: 0.5px;
}

.sources a {
  color: var(--accent);
  text-decoration: none;
  display: block;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.sources a:hover { text-decoration: underline; }

.label {
  font-size: 11px;
  color: var(--text-dim);
  padding: 0 2px;
}

#input-area {
  width: 100%;
  max-width: 760px;
  padding: 16px 20px 20px;
  display: flex;
  gap: 8px;
  border-top: 1px solid var(--border);
  background: var(--bg);
  position: sticky;
  bottom: 0;
}

#question {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--font);
  font-size: 15px;
  padding: 10px 14px;
  resize: none;
  outline: none;
  transition: border-color 0.15s;
  line-height: 1.5;
  min-height: 44px;
  max-height: 160px;
  overflow-y: auto;
  field-sizing: content;
}

#question::placeholder { color: var(--text-dim); }
#question:focus { border-color: var(--accent); }

#send-btn {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  padding: 10px 18px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s, opacity 0.15s;
  align-self: flex-end;
  min-height: 44px;
  white-space: nowrap;
}

#send-btn:hover:not(:disabled) { background: var(--accent-dim); }
#send-btn:disabled { opacity: 0.4; cursor: default; }

#status-bar {
  width: 100%;
  max-width: 760px;
  padding: 0 20px 6px;
  font-size: 12px;
  color: var(--text-dim);
  min-height: 20px;
  text-align: right;
}

.error-msg {
  color: #e05;
  font-size: 13px;
  padding: 4px 0;
}
</style>
</head>
<body>

<header>
  <h1>raggity</h1>
  <span>local-first RAG chat</span>
</header>

<div id="chat-container"></div>
<div id="status-bar"></div>

<div id="input-area">
  <textarea id="question" placeholder="Ask a question…" rows="1" autofocus></textarea>
  <button id="send-btn">Send</button>
</div>

<script>
(function () {
  'use strict';

  // session_id held in JS memory for the browser tab lifetime
  const SESSION_ID = crypto.randomUUID
    ? crypto.randomUUID()
    : Math.random().toString(36).slice(2) + Date.now().toString(36);

  const chatContainer = document.getElementById('chat-container');
  const questionInput  = document.getElementById('question');
  const sendBtn        = document.getElementById('send-btn');
  const statusBar      = document.getElementById('status-bar');

  // Auto-resize textarea up to max-height
  questionInput.addEventListener('input', function () {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 160) + 'px';
  });

  // Enter to send (Shift+Enter for newline)
  questionInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!sendBtn.disabled) sendBtn.click();
    }
  });

  sendBtn.addEventListener('click', sendMessage);

  function setStatus(msg) {
    statusBar.textContent = msg;
  }

  function addMessage(role, text) {
    const wrapper = document.createElement('div');
    wrapper.className = 'message ' + role;

    const label = document.createElement('div');
    label.className = 'label';
    label.textContent = role === 'user' ? 'You' : 'raggity';
    wrapper.appendChild(label);

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    wrapper.appendChild(bubble);

    chatContainer.appendChild(wrapper);
    scrollToBottom();
    return bubble;
  }

  function addSources(citations) {
    const supported = citations.filter(function (c) { return c.supported; });
    if (!supported.length) return;

    // De-dup by source_path
    const seen = new Set();
    const unique = supported.filter(function (c) {
      if (seen.has(c.source_path)) return false;
      seen.add(c.source_path);
      return true;
    });

    const lastMsg = chatContainer.lastElementChild;
    if (!lastMsg) return;

    const box = document.createElement('div');
    box.className = 'sources';

    const heading = document.createElement('strong');
    heading.textContent = 'Sources';
    box.appendChild(heading);

    unique.forEach(function (c) {
      const a = document.createElement('a');
      a.href = '#';
      a.textContent = c.title || c.source_path;
      a.title = c.source_path;
      a.addEventListener('click', function (e) { e.preventDefault(); });
      box.appendChild(a);
    });

    lastMsg.appendChild(box);
    scrollToBottom();
  }

  function scrollToBottom() {
    chatContainer.scrollTop = chatContainer.scrollHeight;
  }

  function sendMessage() {
    const question = questionInput.value.trim();
    if (!question) return;

    questionInput.value = '';
    questionInput.style.height = 'auto';
    sendBtn.disabled = true;
    setStatus('Thinking…');

    addMessage('user', question);

    // Bot bubble we'll stream into
    const botBubble = addMessage('bot', '');
    botBubble.classList.add('streaming');
    let accumulated = '';

    // Build URL for /ask/stream with query params
    const params = new URLSearchParams({
      question: question,
      session_id: SESSION_ID,
    });
    const url = '/ask/stream?' + params.toString();

    let evtSource;
    try {
      evtSource = new EventSource(url);
    } catch (err) {
      botBubble.classList.remove('streaming');
      botBubble.classList.add('error-msg');
      botBubble.textContent = 'Connection error: ' + err.message;
      sendBtn.disabled = false;
      setStatus('');
      return;
    }

    // Default message events carry answer deltas
    evtSource.addEventListener('message', function (e) {
      accumulated += e.data;
      botBubble.textContent = accumulated;
      scrollToBottom();
    });

    // Terminal "done" event carries citations JSON
    evtSource.addEventListener('done', function (e) {
      evtSource.close();
      botBubble.classList.remove('streaming');
      sendBtn.disabled = false;
      setStatus('');

      let payload;
      try {
        payload = JSON.parse(e.data);
      } catch (_) {
        payload = { citations: [] };
      }

      if (payload.citations && payload.citations.length) {
        addSources(payload.citations);
      }
    });

    evtSource.addEventListener('error', function () {
      evtSource.close();
      botBubble.classList.remove('streaming');
      if (!accumulated) {
        botBubble.classList.add('error-msg');
        botBubble.textContent = 'Server error — is the server running?';
      }
      sendBtn.disabled = false;
      setStatus('');
    });
  }

})();
</script>

</body>
</html>
