[sources]
include = ["~/notes/**/*.md", "~/docs/**/*.pdf"]

[embedding]
model = "BAAI/bge-small-en-v1.5"
provider = "cpu"          # cpu | cuda | directml | rocm
# Larger embedding model (768-dim, MRL, 8k context) — requires `rag reindex --force`:
# model = "nomic-embed-text-v1.5-Q"
# batch_size = 32         # chunks per embedding call (increase for large corpora)
# parallel = 0            # embedding workers (0 = auto)
# cache = ".raggity/embed_cache.db"  # SQLite embedding cache; omit to disable

[retrieval]
hybrid = true
rrf_k = 60
candidates = 30
rerank = true
rerank_model = "Xenova/ms-marco-MiniLM-L-6-v2"
# Higher-quality (heavier ~1GB) reranker:
# rerank_model = "BAAI/bge-reranker-v2-m3"
top_k = 5
dedup_cosine = 0.92
relevance_floor = 0.3
# Query transforms (off by default — each adds one model call):
# hyde = true         # generate a hypothetical answer passage to improve dense recall
# step_back = true    # generate a broader "step-back" question to retrieve higher-level context

[generation]
auth = "auto"             # auto (subscription→key) | subscription | api_key
model = "claude-opus-4-8"
# cache = true        # cache answers keyed on question + retrieved chunks + model (off by default)

[index]
path = ".raggity/index"
# backend = "qdrant"           # use Qdrant instead of LanceDB (pip install raggity[qdrant])
# qdrant_location = "http://localhost:6333"  # or ":memory:" (non-persistent) or a local path
# qdrant_collection = "raggity"
# qdrant_api_key = "..."       # or set QDRANT_API_KEY env var (takes precedence)
# ann_threshold = 10000        # build ANN index once chunk count exceeds this

# [watch]
# debounce = 2.0              # seconds of quiet before re-indexing after file changes
#                             # (use `rag watch` command; requires pip install raggity[watch])
