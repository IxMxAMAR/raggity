[sources]
include = ["~/notes/**/*.md", "~/docs/**/*.pdf"]
# URLs fetched automatically on every `rag ingest` (requires: pip install raggity[web]):
# urls = ["https://docs.example.com/overview"]

[embedding]
model = "BAAI/bge-small-en-v1.5"
provider = "cpu"          # cpu | cuda | directml | rocm
batch_size = 256          # chunks per embedding call (default; increase for faster ingest on large corpora)
parallel = 0              # embedding workers (0 = auto)
cache = false             # cache embeddings as JSON under index directory
# Larger embedding model (768-dim, MRL, 8k context) — requires `rag reindex --force`:
# model = "nomic-embed-text-v1.5-Q"

[retrieval]
hybrid = true
rrf_k = 60
candidates = 30
rerank = true
rerank_model = "Xenova/ms-marco-MiniLM-L-6-v2"
# Higher-quality (heavier ~1GB) reranker:
# rerank_model = "BAAI/bge-reranker-v2-m3"
top_k = 5
dedup_cosine = 0.92
relevance_floor = 0.3
# Query transforms (off by default — each adds one model call):
# hyde = true         # generate a hypothetical answer passage to improve dense recall
# step_back = true    # generate a broader "step-back" question to retrieve higher-level context

[generation]
backend = "claude"        # claude (default) | openai | ollama
auth = "auto"             # auto (subscription→key) | subscription | api_key  (claude backend only)
model = "claude-opus-4-8"
# cache = true        # cache answers keyed on question + retrieved chunks + model (off by default)

# OpenAI-compatible backend (requires: pip install raggity[openai]):
# backend = "openai"
# model = "gpt-4o-mini"
# base_url = "https://api.openai.com/v1"   # default; any OpenAI-compatible URL works
# api_key_env = "OPENAI_API_KEY"           # env var name holding the API key

# Ollama offline backend (no API key needed; requires Ollama running locally):
# backend = "ollama"
# model = "llama3.1"
# base_url = "http://localhost:11434/v1"   # default for ollama; omit to use this

[index]
path = ".raggity/index"
backend = "lancedb"          # lancedb (default) | qdrant
ann_threshold = 50000        # build ANN index once chunk count exceeds this
# qdrant_location = "http://localhost:6333"  # only when backend = "qdrant"; or ":memory:" (non-persistent) or a local path
# qdrant_collection = "raggity"
# qdrant_api_key = "..."                     # or set QDRANT_API_KEY env var (takes precedence)

# Watch daemon: `rag watch [--debounce SECONDS]`
# Use `--debounce` CLI flag (not a config key) to customize quiet time before re-indexing
# Requires: pip install raggity[watch]
