site_name: raggity
site_description: Local-first, top-tier RAG over your notes, docs, and PDFs — answered by Claude.
site_url: https://ixmxamar.github.io/raggity/
repo_url: https://github.com/IxMxAMAR/raggity
repo_name: IxMxAMAR/raggity

theme:
  name: material
  features:
    - navigation.sections
    - content.code.copy
    - content.code.annotate
    - navigation.top
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Overview: index.md
  - Demo: demo.md
  - Installation: install.md
  - Quickstart: quickstart.md
  - Configuration: configuration.md
  - Backends: backends.md
  - Retrieval: retrieval.md
  - Ingestion: ingestion.md
  - Server & API: server.md
  - MCP server: mcp.md
  - Deploy: deploy.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
