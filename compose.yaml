services:

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  raggity:
    build: .
    restart: unless-stopped
    depends_on:
      - qdrant
    ports:
      - "8000:8000"
    # Mount your config file read-only; edit raggity.toml on the host.
    volumes:
      - ./raggity.toml:/app/raggity.toml:ro
      # raggity's default index.path is .raggity/index → /app/.raggity inside the container,
      # so mount the volume there to persist the index across restarts.
      - raggity_data:/app/.raggity
    environment:
      # Pass API keys from the host environment (unset vars are silently ignored).
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    # env_file:
    #   - .env   # uncomment to load an .env file instead

  # ---------------------------------------------------------------------------
  # Ollama — local LLM sidecar.  Start with:  docker compose --profile ollama up
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    profiles:
      - ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama

volumes:
  qdrant_storage:
  raggity_data:
  ollama_models:
