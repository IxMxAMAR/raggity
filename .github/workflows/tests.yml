name: tests

on:
  push:
  pull_request:

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13", "3.12", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache fastembed/HF models
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/fastembed
            ~/.cache/huggingface
          key: models-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            models-${{ matrix.python-version }}-

      - name: Install dependencies
        run: pip install -e ".[server,qdrant,openai,web,docs,ocr,graph,otel,watch,dev]"

      - name: Run tests
        run: python -m pytest -q
