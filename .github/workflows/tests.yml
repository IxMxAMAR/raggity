name: tests

on:
  push:
  pull_request:

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.11"
            extras: "server,qdrant,openai,web,docs,ocr,graph,otel,watch,dev"
          - python-version: "3.12"
            extras: "server,qdrant,openai,web,docs,ocr,graph,otel,watch,dev"
          # Python 3.13: the `ocr` extra (rapidocr-onnxruntime) has no 3.13 wheels yet,
          # so it is excluded here. The OCR code path is import-lazy and its tests mock
          # the dependency, so the suite still runs fully on 3.13.
          - python-version: "3.13"
            extras: "server,qdrant,openai,web,docs,graph,otel,watch,dev"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache fastembed/HF models
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/fastembed
            ~/.cache/huggingface
          key: models-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            models-${{ matrix.python-version }}-

      - name: Install dependencies
        run: pip install -e ".[${{ matrix.extras }}]"

      - name: Run tests
        run: python -m pytest -q
