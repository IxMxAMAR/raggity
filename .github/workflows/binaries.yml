name: binaries

# Builds standalone `rag` binaries (no Python required) for Windows, Linux and
# macOS via PyInstaller (packaging/raggity.spec, onedir).
#
#   * release: published  -> build + attach zip/tar.gz/.deb to the GitHub Release
#   * workflow_dispatch    -> build + upload as workflow artifacts only (test runs)
#
# Artifact naming:
#   raggity-<version>-windows-x86_64.zip
#   raggity-<version>-linux-x86_64.tar.gz
#   raggity_<version>_amd64.deb
#   raggity-<version>-macos-arm64.tar.gz

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 0.10.0) — for test runs"
        required: true
      release_tag:
        description: "Existing release tag to attach the artifacts to (e.g. v0.10.0). Leave empty for artifacts-only test runs."
        required: false
        default: ""

permissions:
  contents: write   # required to attach assets to the release

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows-x86_64
            runner: windows-latest
            os: windows
          - target: linux-x86_64
            runner: ubuntu-latest
            os: linux
          - target: macos-arm64
            runner: macos-14
            os: macos

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            v="${{ github.event.release.tag_name }}"
          else
            v="${{ github.event.inputs.version }}"
          fi
          v="${v#v}"                       # strip a leading v
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Building raggity $v for ${{ matrix.target }}"

      - name: Install build dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install . pyinstaller

      - name: Build onedir binary
        shell: bash
        run: pyinstaller packaging/raggity.spec --noconfirm --clean

      - name: Sanity run (--help)
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows" ]; then
            ./dist/rag/rag.exe --help
          else
            ./dist/rag/rag --help
          fi

      # ---- packaging: Windows zip (contents at zip root) --------------------
      - name: Package Windows zip
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.version }}"
          New-Item -ItemType Directory -Force dist-artifacts | Out-Null
          $zip = "dist-artifacts/raggity-$ver-windows-x86_64.zip"
          # dist/rag/* -> rag.exe sits at the zip root alongside its libs
          Compress-Archive -Path dist/rag/* -DestinationPath $zip
          Write-Host "Built $zip"

      # ---- packaging: Linux tar.gz + .deb -----------------------------------
      - name: Package Linux tar.gz and .deb
        if: matrix.os == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          ver="${{ steps.version.outputs.version }}"
          mkdir -p dist-artifacts

          # tar.gz — contents at archive root (rag alongside _internal/)
          tar -czf "dist-artifacts/raggity-$ver-linux-x86_64.tar.gz" -C dist/rag .

          # .deb — onedir under /opt/raggity, /usr/bin/rag symlink into it
          pkgroot="$(mktemp -d)/raggity_${ver}_amd64"
          mkdir -p "$pkgroot/opt/raggity" "$pkgroot/usr/bin" "$pkgroot/DEBIAN"
          cp -r dist/rag/. "$pkgroot/opt/raggity/"
          ln -s /opt/raggity/rag "$pkgroot/usr/bin/rag"
          cat > "$pkgroot/DEBIAN/control" <<EOF
          Package: raggity
          Version: ${ver}
          Architecture: amd64
          Maintainer: IxMxAMAR <officialamrendrasingh@gmail.com>
          Depends: libc6
          Section: utils
          Priority: optional
          Description: Local-first, top-tier RAG over your notes, docs and PDFs.
           raggity is a standalone RAG CLI (the "rag" command) that ingests your
           documents and answers questions with citations. This package ships a
           self-contained build; no Python installation is required. The Claude
           backend additionally needs Claude Code ("claude") on PATH; local
           backends (Ollama, etc.) work out of the box.
          EOF
          deb="dist-artifacts/raggity_${ver}_amd64.deb"
          dpkg-deb --build --root-owner-group "$pkgroot" "$deb"

          # sanity: inspect, install into the runner, run through the symlink
          dpkg-deb --info "$deb"
          dpkg-deb --contents "$deb" | grep -E ' \./(usr/bin/rag|opt/raggity/rag)$' || true
          sudo apt-get update -qq
          sudo apt-get install -y "./$deb"
          rag --help

      # ---- packaging: macOS tar.gz ------------------------------------------
      - name: Package macOS tar.gz
        if: matrix.os == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          ver="${{ steps.version.outputs.version }}"
          mkdir -p dist-artifacts
          tar -czf "dist-artifacts/raggity-$ver-macos-arm64.tar.gz" -C dist/rag .

      # ---- checksums ---------------------------------------------------------
      - name: Write SHA256 checksums
        shell: bash
        run: |
          cd dist-artifacts
          for f in *; do
            case "$f" in *.sha256) continue;; esac
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum "$f" > "$f.sha256"
            else
              shasum -a 256 "$f" > "$f.sha256"
            fi
          done
          cat *.sha256

      # ---- upload -----------------------------------------------------------
      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: raggity-${{ matrix.target }}
          path: dist-artifacts/*
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ github.event_name == 'release' && github.event.release.tag_name || github.event.inputs.release_tag }}"
          gh release upload "$tag" dist-artifacts/* --clobber
